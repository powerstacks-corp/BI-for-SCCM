site_name: BI for SCCM by PowerStacks
site_description: Comprehensive Power BI reporting for Microsoft Configuration Manager
site_url: https://powerstacks-corp.github.io/BI-for-SCCM/

repo_url: https://github.com/powerstacks-corp/BI-for-SCCM
repo_name: BI-for-SCCM

docs_dir: docs

theme:
  name: material
  language: en
  font:
    text: Segoe UI
    code: Cascadia Code
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs/overrides

extra_css:
  - stylesheets/microsoft-learn.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - glightbox:
      skip_classes:
        - skip-lightbox

nav:
  - Home: index.md
  - Getting Started:
    - Install BI for SCCM: guides/install-bi-for-sccm.md
    - Request a License Key: guides/request-a-license-key.md
  - Setup Guide:
    - Install Power BI Gateway: guides/install-power-bi-gateway.md
    - Configure Database Access: guides/configure-database-access.md
    - Configure the Dataset: guides/configure-the-dataset.md
    - Enable Azure Maps: guides/enable-azure-maps.md
    - AD User Discovery: guides/ad-user-discovery.md
  - Inventory Extensions:
    - BitLocker: guides/inventory-bitlocker.md
    - Local Admin Group: guides/inventory-local-admin-group.md
    - Lenovo Model Names: guides/inventory-lenovo-model-names.md
    - Microsoft 365 Apps: guides/inventory-microsoft-365-apps.md
    - Disk Types: guides/inventory-disk-types.md
    - Antivirus Software: guides/inventory-antivirus-software.md
    - Monitors: guides/inventory-monitors.md
    - Environment Variables: guides/inventory-environment-variables.md
    - USB Devices: guides/inventory-usb-devices.md
    - Warranty Info: guides/collect-warranty-info.md
  - Administration:
    - Dataset Parameters: guides/dataset-parameters.md
    - Backup Custom Reports: guides/backup-custom-reports.md
    - Perform In-place Upgrade: guides/perform-in-place-upgrade.md
    - Create Backup Workspace: guides/create-backup-workspace.md
  - Customization:
    - How to Edit Reports: guides/how-to-edit-bi-for-sccm-reports.md
    - How to Create Popup Box Visuals: guides/how-to-create-popup-box-visuals.md
  - FAQ: guides/faq.md
  - Release Notes:
    - All Versions: release-notes/index.md
    - Version 17.0 February 20, 2026: release-notes/version-17-0-february-20-2026.md
    - Version 16.0 June 23, 2025: release-notes/version-16-0-june-23-2025.md
    - Version 15.0 June 15, 2025: release-notes/version-15-0-june-15-2025.md
    - Version 14.0 March 9, 2025: release-notes/version-14-0-march-9-2025.md
    - Version 13.0 Jan. 15, 2025: release-notes/version-13-0-jan-15-2025.md
    - Version 12.0 June 10, 2024: release-notes/version-12-0-june-10-2024.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/powerstacks-corp/BI-for-SCCM
  generator: false
